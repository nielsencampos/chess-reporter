apiVersion: v1
kind: Service
metadata:
  name: chess-reporter-engine-master
  namespace: chess-reporter
spec:
  clusterIP: None
  selector:
    app: chess-reporter-engine-master
  ports:
    - port: 1000
      targetPort: 1000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chess-reporter-engine-master
  namespace: chess-reporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chess-reporter-engine-master
  template:
    metadata:
      labels:
        app: chess-reporter-engine-master
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      serviceAccountName: chess-reporter-engine-master
      containers:
        - name: chess-reporter-engine-master
          image: ghcr.io/nielsencampos/chess-reporter-engine-master:latest
          ports:
            - containerPort: 1000
          livenessProbe:
            httpGet:
              path: /health
              port: 1000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 1000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: chess-reporter-engine-master
  namespace: chess-reporter
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: chess-reporter-engine-master
  namespace: chess-reporter
rules:
  - apiGroups: ["apps"]
    resources: ["statefulsets", "statefulsets/scale"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: chess-reporter-engine-master
  namespace: chess-reporter
subjects:
  - kind: ServiceAccount
    name: chess-reporter-engine-master
    namespace: chess-reporter
roleRef:
  kind: Role
  name: chess-reporter-engine-master
  apiGroup: rbac.authorization.k8s.io
